<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regional Monitoring Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body{margin:0;font-family:Arial;background:#f5f7fb;color:#0f172a}
      .main{padding:16px}
      .topbar{position:sticky;top:0;z-index:10;background:#fff;padding:12px;border-bottom:1px solid #dbe2ea;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px}
      .topbar select,.topbar button,.topbar input{width:100%;padding:8px}
      .card{background:#fff;border-radius:8px;padding:12px;margin-top:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
      .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
      .table-wrap{max-height:65vh;overflow:auto}
      table{width:100%;border-collapse:collapse}
      th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
      .muted{font-size:12px;color:#64748b}
    </style>
  </head>
  <body><div id="root"></div>
    <script type="text/babel">
      const {useEffect, useState} = React;
      const api = (path) => fetch(path).then(r => r.json());
      const Multi = ({label, options, value, onChange}) => <div><label>{label}</label><select multiple value={value} onChange={e=>onChange([...e.target.selectedOptions].map(o=>o.value))}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>

      function App(){
        const [meta, setMeta] = useState({countries:[], plans:[], years:[], metrics:[], attribute_filters:{}, latest_upload:null});
        const [filters, setFilters] = useState({country:[], plan_name:[], year:[], metric:'', dynamic:{}});
        const [data, setData] = useState([]);
        const [uploading, setUploading] = useState(false);

        const loadMeta = async()=>{
          const m = await api('/api/filters');
          setMeta(m);
          if (!filters.metric && m.metrics.length) setFilters(f=>({...f, metric:m.metrics[0]}));
        };

        const loadData = async()=>{
          const p = new URLSearchParams();
          filters.country.forEach(v=>p.append('country', v));
          filters.plan_name.forEach(v=>p.append('plan_name', v));
          filters.year.forEach(v=>p.append('year', v));
          Object.entries(filters.dynamic).forEach(([k,arr])=>arr.forEach(v=>{p.append('attribute_key',k);p.append('attribute_value',v)}));
          if (filters.metric) p.append('metric', filters.metric);
          const res = await api('/api/data?'+p.toString());
          setData(res.rows);
        };

        const uploadFile = async (file)=>{
          if (!file) return;
          const form = new FormData();
          form.append('file', file);
          setUploading(true);
          const resp = await fetch('/api/upload?mode=replace', {method:'POST', body:form});
          setUploading(false);
          if (!resp.ok){ alert('Upload failed. Please check the CSV format.'); return; }
          await loadMeta();
          await loadData();
          alert('CSV imported and dashboard updated.');
        };

        useEffect(()=>{loadMeta()},[]);
        useEffect(()=>{loadData()},[filters]);

        const numeric = data.map(r=>Number(r[filters.metric])).filter(v=>!isNaN(v));
        const total = numeric.reduce((a,b)=>a+b,0);

        return <main className='main'>
          <h1>Regional Monitoring Tool</h1>
          <div className='muted'>Latest upload: {meta.latest_upload || 'No data uploaded yet'}</div>
          <div className='topbar'>
            <Multi label='Country' options={meta.countries} value={filters.country} onChange={v=>setFilters({...filters, country:v})}/>
            <Multi label='Plan Name' options={meta.plans} value={filters.plan_name} onChange={v=>setFilters({...filters, plan_name:v})}/>
            <Multi label='Year' options={meta.years.map(String)} value={filters.year.map(String)} onChange={v=>setFilters({...filters, year:v.map(Number)})}/>
            <div><label>Metric</label><select value={filters.metric} onChange={e=>setFilters({...filters, metric:e.target.value})}>{meta.metrics.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
            {Object.entries(meta.attribute_filters).slice(0,6).map(([k,opts])=><Multi key={k} label={k} options={opts} value={filters.dynamic[k]||[]} onChange={v=>setFilters({...filters, dynamic:{...filters.dynamic,[k]:v}})} />)}
            <div>
              <label>Import CSV / Excel</label>
              <input type='file' accept='.csv,.xlsx,.xls' onChange={e=>uploadFile(e.target.files?.[0])} />
              <button disabled={uploading} onClick={()=>window.open('/api/export','_blank')}>{uploading ? 'Uploading...' : 'Export CSV'}</button>
            </div>
          </div>

          <div className='kpis card'>
            <div><b>Records</b><div>{data.length}</div></div>
            <div><b>Total ({filters.metric})</b><div>{total.toFixed(2)}</div></div>
            <div><b>Average ({filters.metric})</b><div>{numeric.length ? (total/numeric.length).toFixed(2):'0.00'}</div></div>
          </div>

          <div className='card table-wrap'>
            <table><thead><tr>{Object.keys(data[0]||{}).map(k=><th key={k}>{k}</th>)}</tr></thead><tbody>{data.slice(0,500).map((r,i)=><tr key={i}>{Object.entries(r).map(([k,v])=><td key={k}>{String(v??'')}</td>)}</tr>)}</tbody></table>
          </div>
        </main>
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
