<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regional Monitoring Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body{margin:0;font-family:Arial;background:#f5f7fb}.app{display:flex;min-height:100vh}.sidebar{width:320px;background:#0f172a;color:#fff;padding:14px;overflow:auto}.main{flex:1;padding:20px}.card{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}select,button{width:100%;margin:6px 0;padding:8px}.table-wrap{max-height:60vh;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
    </style>
  </head>
  <body><div id="root"></div>
    <script type="text/babel">
      const {useEffect, useState} = React;
      const api = (path) => fetch(path).then(r => r.json());
      const Multi = ({label, options, value, onChange}) => <div><label>{label}</label><select multiple value={value} onChange={e=>onChange([...e.target.selectedOptions].map(o=>o.value))}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>

      function App(){
        const [meta, setMeta] = useState({countries:[], plans:[], years:[], metrics:[], attribute_filters:{}});
        const [filters, setFilters] = useState({country:[], plan_name:[], year:[], metric:'', dynamic:{}});
        const [data, setData] = useState([]);

        const loadMeta = async()=>{
          const m = await api('/api/filters');
          setMeta(m);
          if (!filters.metric && m.metrics.length) setFilters(f=>({...f, metric:m.metrics[0]}));
        }

        const loadData = async()=>{
          const p = new URLSearchParams();
          filters.country.forEach(v=>p.append('country', v));
          filters.plan_name.forEach(v=>p.append('plan_name', v));
          filters.year.forEach(v=>p.append('year', v));
          Object.entries(filters.dynamic).forEach(([k,arr])=>arr.forEach(v=>{p.append('attribute_key',k);p.append('attribute_value',v)}));
          if (filters.metric) p.append('metric', filters.metric);
          const res = await api('/api/data?'+p.toString());
          setData(res.rows);
        }

        useEffect(()=>{loadMeta()},[]);
        useEffect(()=>{loadData()},[filters]);

        const numeric = data.map(r=>Number(r[filters.metric])).filter(v=>!isNaN(v));
        const total = numeric.reduce((a,b)=>a+b,0);

        return <div className='app'>
          <aside className='sidebar'>
            <h2>Regional Monitoring</h2>
            <Multi label='Country' options={meta.countries} value={filters.country} onChange={v=>setFilters({...filters, country:v})}/>
            <Multi label='Plan Name' options={meta.plans} value={filters.plan_name} onChange={v=>setFilters({...filters, plan_name:v})}/>
            <Multi label='Year' options={meta.years.map(String)} value={filters.year.map(String)} onChange={v=>setFilters({...filters, year:v.map(Number)})}/>
            <label>Metric</label>
            <select value={filters.metric} onChange={e=>setFilters({...filters, metric:e.target.value})}>{meta.metrics.map(m=><option key={m} value={m}>{m}</option>)}</select>
            {Object.entries(meta.attribute_filters).slice(0,8).map(([k,opts])=><Multi key={k} label={k} options={opts} value={filters.dynamic[k]||[]} onChange={v=>setFilters({...filters, dynamic:{...filters.dynamic,[k]:v}})} />)}
            <button onClick={()=>window.open('/api/export','_blank')}>Export CSV</button>
          </aside>
          <main className='main'>
            <h1>What is happening in the region</h1>
            <div className='kpis'>
              <div className='card'><b>Records</b><div>{data.length}</div></div>
              <div className='card'><b>Total ({filters.metric})</b><div>{total.toFixed(2)}</div></div>
              <div className='card'><b>Average ({filters.metric})</b><div>{numeric.length ? (total/numeric.length).toFixed(2):'0.00'}</div></div>
            </div>
            <div className='card table-wrap'>
              <table><thead><tr>{Object.keys(data[0]||{}).map(k=><th key={k}>{k}</th>)}</tr></thead><tbody>{data.slice(0,300).map((r,i)=><tr key={i}>{Object.entries(r).map(([k,v])=><td key={k}>{String(v??'')}</td>)}</tr>)}</tbody></table>
            </div>
          </main>
        </div>
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
